name: drug-tox-env
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - rdkit
  - numpy<2.0
  - pandas
  - scikit-learn
  - matplotlib
  - seaborn
  - umap-learn
  - jupyter
  - ipykernel
  - pip
  - pip:
    - transformers>=4.20.0
    - networkx
    - matplotlib-venn
    - pillow
    - scipy>=1.14.1
    - huggingface_hub>=0.22.2
    - optuna>=4.0.0
    - deepchem
    - pytdc
    - torch-molecule
