name: Frontend Auto Deploy

'on':
  push:
    branches:
      - main
    paths:
      - frontend/**
      - firebase.json
      - .firebaserc
      - .github/workflows/frontend-autodeploy.yml
  workflow_dispatch:

concurrency:
  group: frontend-autodeploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      FIREBASE_PROJECT_ID: ${{ vars.FIREBASE_PROJECT_ID || vars.GCP_PROJECT_ID || 'tox-agent' }}
      SITE_ID: ${{ vars.FIREBASE_SITE_ID || vars.FIREBASE_PROJECT_ID || vars.GCP_PROJECT_ID || 'tox-agent' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT_EMAIL }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Build frontend
        run: npm --prefix frontend run build

      - name: Deploy frontend to Firebase Hosting
        run: |
          npx -y firebase-tools@latest deploy \
            --only hosting \
            --project "${FIREBASE_PROJECT_ID}" \
            --non-interactive

      - name: Smoke test public frontend URL
        run: |
          APP_URL="https://${SITE_ID}.web.app"
          echo "Deployed frontend URL: ${APP_URL}"
          curl -fsSI --max-time 120 "${APP_URL}" | head -n 5
