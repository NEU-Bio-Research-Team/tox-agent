# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. Lấy code từ GitHub về máy ảo
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # 2. Cài đặt thư viện (Vite, Firebase, etc.)
      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      # 3. Biên dịch dự án để tạo ra thư mục 'dist'
      - name: Build project
        run: npm run build
        working-directory: frontend

      # 4. Đẩy thư mục 'dist' lên Firebase Hosting
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TOX_AGENT }}
          channelId: live
          projectId: tox-agent