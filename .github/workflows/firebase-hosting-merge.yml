name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # BƯỚC QUAN TRỌNG NHẤT: Cài đặt thư viện trước khi build
      - name: Install dependencies
        run: npm ci

      # BƯỚC 2: Chạy build để tạo ra thư mục dist
      - name: Build project
        run: npm run build

      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TOX_AGENT }}
          channelId: live
          projectId: tox-agent