name: Build and Push Model Server GPU Image

'on':
  push:
    branches:
      - main
    paths:
      - model_server/**
      - .github/workflows/build-push.yml
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/tox-model-server
    outputs:
      image_name: ${{ steps.vars.outputs.image_name }}
      image_tag: ${{ steps.vars.outputs.image_tag }}
      image_ref: ${{ steps.vars.outputs.image_ref }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Docker Hub secrets
        run: |
          if [[ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]]; then
            echo "Missing DOCKERHUB_USERNAME secret."
            exit 1
          fi

          if [[ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]]; then
            echo "Missing DOCKERHUB_TOKEN secret."
            exit 1
          fi

      - name: Compute image tags
        id: vars
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          DATE_TAG="$(date -u +'%Y%m%d-%H%M%S')"
          IMAGE_TAG="gpu-${DATE_TAG}-${SHORT_SHA}"
          IMAGE_REF="${IMAGE_NAME}:${IMAGE_TAG}"

          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push GPU image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: model_server/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            TORCH_VARIANT=cu121
            BASE_IMAGE=nvidia/cuda:12.1.1-cudnn8-runtime-ubuntu22.04
          tags: |
            ${{ steps.vars.outputs.image_ref }}
            ${{ steps.vars.outputs.image_name }}:gpu-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Print image details in logs
        run: |
          echo "IMAGE_NAME=${{ steps.vars.outputs.image_name }}"
          echo "IMAGE_TAG=${{ steps.vars.outputs.image_tag }}"
          echo "IMAGE_REF=${{ steps.vars.outputs.image_ref }}"
          echo "IMAGE_STABLE=${{ steps.vars.outputs.image_name }}:gpu-latest"

      - name: Publish image details
        run: |
          {
            echo "## Docker Image Published"
            echo ""
            echo "- Image name: \`${{ steps.vars.outputs.image_name }}\`"
            echo "- Version tag: \`${{ steps.vars.outputs.image_tag }}\`"
            echo "- Full image: \`${{ steps.vars.outputs.image_ref }}\`"
            echo "- Stable tag: \`${{ steps.vars.outputs.image_name }}:gpu-latest\`"
          } >> "$GITHUB_STEP_SUMMARY"