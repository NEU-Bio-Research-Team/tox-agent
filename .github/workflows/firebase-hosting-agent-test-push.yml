name: Auto deploy frontend live on agent_test push

on:
  push:
    branches:
      - agent_test
    paths:
      - frontend/**
      - firebase.json
      - .firebaserc
      - package.json
      - package-lock.json
      - .github/workflows/firebase-hosting-agent-test-push.yml

permissions:
  contents: read
  id-token: write

jobs:
  deploy_frontend_live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/147622422092/locations/global/workloadIdentityPools/github-actions-pool/providers/github-oidc
          service_account: github-action-1193576515@tox-agent.iam.gserviceaccount.com

      - name: Install Firebase CLI
        run: npm install --global firebase-tools

      - name: Deploy to Firebase Hosting live
        run: firebase deploy --only hosting --project tox-agent --non-interactive
