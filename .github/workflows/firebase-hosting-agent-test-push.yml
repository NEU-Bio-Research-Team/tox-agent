name: Auto deploy frontend live on agent_test push

on:
  push:
    branches:
      - agent_test
    paths:
      - frontend/**
      - firebase.json
      - .firebaserc
      - package.json
      - package-lock.json
      - .github/workflows/firebase-hosting-agent-test-push.yml

permissions:
  checks: write
  contents: read
  pull-requests: write
  deployments: write

jobs:
  deploy_frontend_live:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Deploy to Firebase Hosting live
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_TOX_AGENT }}
          projectId: tox-agent
          channelId: live
