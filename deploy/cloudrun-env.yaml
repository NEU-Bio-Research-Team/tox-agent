# Paste your runtime keys here, then run:
#   ./scripts/apply_cloudrun_env.sh
#
# These variables are applied to Cloud Run service tox-agent-cpu by default.

GOOGLE_API_KEY: "AIza..."
PUBMED_API_KEY: ""

# Optional model overrides. Keep defaults unless you need different models.
AGENT_MODEL_FAST: "gemini-2.5-flash"
AGENT_MODEL_PRO: "gemini-2.5-pro"
GEMINI_MODEL: "gemini-2.5-flash"

# Use Vertex AI billing path (project/service-account auth) instead of AI Studio key flow.
GOOGLE_GENAI_USE_VERTEXAI: "true"
GOOGLE_CLOUD_PROJECT: "tox-agent"
GOOGLE_CLOUD_LOCATION: "asia-southeast1"
GEMINI_LOCATION: "asia-southeast1"

AGENT_APP_NAME: "tox-agent"
MODEL_SERVER_TIMEOUT: "30"
