model:
  name: "PretrainedMolDualHeadPredictor"
  pretrained_model: "seyonec/PubChem10M_SMILES_BPE_450k"
  dropout: 0.1
  num_tox21_tasks: 12
  use_herg_mlp: true
  herg_hidden_dim: 256

training:
  max_length: 128

  phase1:
    num_epochs: 3
    batch_size: 24
    backbone_learning_rate: 2.0e-5
    head_learning_rate: 5.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.1
    early_stopping_patience: 3
    early_stopping_metric: "macro_auc_roc"
    log_every_n_epochs: 1
    loss_type: "focal"
    focal_alpha: 0.25
    focal_gamma: 2.0
    use_task_pos_weights: true
    use_weighted_sampler: true
    grad_clip_norm: 1.0

  phase2:
    num_epochs: 2
    batch_size_tox21: 24
    batch_size_herg: 24
    backbone_learning_rate: 1.0e-5
    tox21_head_learning_rate: 2.0e-4
    herg_head_learning_rate: 5.0e-4
    weight_decay: 0.01
    warmup_ratio: 0.1
    freeze_layers: 2
    freeze_embeddings: false
    alpha_tox21: 1.0
    beta_mode: "fixed"
    beta_herg: 3.0
    selection_metric: "joint_auc"
    early_stopping_patience: 3
    log_every_n_epochs: 1
    loss_type: "weighted_bce"
    focal_alpha: 0.25
    focal_gamma: 2.0
    use_task_pos_weights: true
    herg_loss_type: "focal"
    herg_focal_alpha: 0.25
    herg_focal_gamma: 2.0
    herg_use_pos_weight: true
    use_weighted_sampler_herg: true
    grad_clip_norm: 1.0

threshold_calibration:
  enabled: true
  method: "val"
  fit_split: "train_val"
  cv_folds: 3
  min: 0.05
  max: 0.95
  step: 0.01
  default_threshold: 0.5

tox21_threshold_calibration:
  enabled: true
  method: "val"
  cv_folds: 3
  min: 0.05
  max: 0.95
  step: 0.01
  default_threshold: 0.5

data:
  cache_dir: "data"
  split_type: "scaffold"
  seed: 42

output:
  model_dir: "models/pretrained_2head_herg_pubchem_quick"
